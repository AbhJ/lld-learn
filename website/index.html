<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0a0a23">
    <title>LLD Problems — Low Level Design in Java</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230a0a23' width='100' height='100' rx='12'/><text x='50' y='68' font-size='52' text-anchor='middle' fill='%23d4af6a' font-family='serif'>L</text></svg>">
    <!-- Same fonts as portfolio -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,400&family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <!-- Prism.js for syntax highlighting -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-numbers/prism-line-numbers.min.css" rel="stylesheet">
    <!-- Marked.js for markdown -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-numbers/prism-line-numbers.min.js"></script>
    <!-- Monaco editor (lazy-loaded on first Edit click) -->
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Fixed Navbar -->
    <nav class="navbar" id="navbar">
        <div class="navbar-brand">
            <span class="navbar-logo">&#9670;</span>
            <span class="navbar-title">LLD Problems</span>
        </div>
        <div class="navbar-links">
            <a href="#" class="nav-link active" data-nav="problems">All Problems</a>
            <a href="#patterns" class="nav-link" data-nav="patterns">Patterns</a>
            <a href="#progress" class="nav-link" data-nav="progress">Progress</a>
        </div>
        <button class="mobile-hamburger" id="mobile-hamburger" aria-label="Toggle sidebar">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </nav>

    <!-- Layout container -->
    <div class="layout">
        <!-- Sidebar overlay for mobile -->
        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <!-- Left Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-inner">
                <!-- Search -->
                <div class="sidebar-search">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                    <input type="text" id="search-input" placeholder="Search problems..." autocomplete="off" spellcheck="false">
                </div>

                <!-- Filters -->
                <div class="sidebar-filters">
                    <div class="filter-chips" id="difficulty-chips">
                        <button class="chip active" data-difficulty="">All</button>
                        <button class="chip chip-easy" data-difficulty="Easy">Easy</button>
                        <button class="chip chip-medium" data-difficulty="Medium">Medium</button>
                        <button class="chip chip-hard" data-difficulty="Hard">Hard</button>
                    </div>
                    <div class="filter-chips pattern-chips" id="pattern-chips">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <!-- Progress -->
                <div class="sidebar-progress">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                    <span class="progress-text" id="progress-text">0 / 0 completed</span>
                </div>

                <!-- Folder tree -->
                <div class="folder-tree" id="folder-tree">
                    <!-- Populated by JS -->
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content" id="main-content">
            <!-- Welcome view (default) -->
            <div class="view view-welcome" id="view-welcome">
                <div class="welcome-hero">
                    <h1 class="welcome-title">Low-Level Design<br><em>in Java</em></h1>
                    <p class="welcome-subtitle">50 comprehensive problems with naive and optimized solutions, design patterns, and interview preparation.</p>
                    <div class="welcome-stats" id="welcome-stats"></div>
                </div>
            </div>

            <!-- Problem overview (when a problem is selected but no file) -->
            <div class="view view-problem" id="view-problem" style="display:none;">
                <div class="problem-header">
                    <div class="problem-title-row">
                        <h1 class="problem-title" id="problem-title"></h1>
                        <button class="btn-progress" id="btn-progress" title="Mark as completed">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                <path d="M20 6L9 17l-5-5"></path>
                            </svg>
                        </button>
                    </div>
                    <div class="problem-meta" id="problem-meta"></div>
                </div>
                <div class="problem-body" id="problem-body"></div>
            </div>

            <!-- Code viewer (when a file is selected) -->
            <div class="view view-code" id="view-code" style="display:none;">
                <div class="code-header">
                    <div class="code-breadcrumb" id="code-breadcrumb"></div>
                    <div class="code-header-actions">
                        <button class="btn-edit" id="btn-edit" title="Edit code in browser">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                            </svg>
                            <span>Edit</span>
                        </button>
                        <button class="btn-run" id="btn-run" title="Compile and run (sends to local server)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polygon points="5 3 19 12 5 21 5 3" fill="currentColor"></polygon>
                            </svg>
                            <span>Run</span>
                        </button>
                        <button class="btn-tests" id="btn-tests" title="Run test cases">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M9 11l3 3L22 4"></path>
                                <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
                            </svg>
                            <span>Tests</span>
                        </button>
                        <button class="btn-copy" id="btn-copy" title="Copy to clipboard">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                            </svg>
                            <span>Copy</span>
                        </button>
                    </div>
                </div>
                <div class="code-container">
                    <pre class="line-numbers"><code class="language-java" id="code-content"></code></pre>
                    <div class="code-editor" id="code-editor" style="display:none;"></div>
                </div>
                <div class="run-panel" id="run-panel" style="display:none;">
                    <div class="run-panel-header">
                        <span class="run-panel-title" id="run-panel-title">Output</span>
                        <button class="run-panel-close" id="run-panel-close" title="Close">×</button>
                    </div>
                    <div class="run-panel-body" id="run-panel-body"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
